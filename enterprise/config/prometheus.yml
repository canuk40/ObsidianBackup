global:
  scrape_interval: 15s
  evaluation_interval: 15s
  external_labels:
    environment: 'production'
    service: 'obsidian-enterprise'

scrape_configs:
  - job_name: 'obsidian-backend'
    metrics_path: '/actuator/prometheus'
    static_configs:
      - targets: ['backend:8080']
        labels:
          application: 'obsidian-enterprise-backend'
          instance: 'backend-1'
    
  - job_name: 'postgres'
    static_configs:
      - targets: ['postgres-exporter:9187']
        labels:
          application: 'postgresql'
    
  - job_name: 'redis'
    static_configs:
      - targets: ['redis-exporter:9121']
        labels:
          application: 'redis'

alerting:
  alertmanagers:
    - static_configs:
        - targets: []
