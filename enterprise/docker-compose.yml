# ===================================
# ObsidianBackup Enterprise Backend
# Production Docker Compose Configuration
# ===================================
# 
# Usage:
#   Development:  docker-compose --profile dev up -d
#   Staging:      docker-compose --profile staging up -d
#   Production:   docker-compose --profile production up -d
# 
# Prerequisites:
#   1. Copy .env.example to .env and configure
#   2. Generate secrets (see .env.example)
#   3. Create Docker secrets (production only)
# 
# Security Notes:
#   - Use Docker secrets in production (not environment variables)
#   - Never commit .env file
#   - Rotate secrets regularly
# ===================================

version: '3.8'

# ===================================
# Docker Secrets (Production)
# ===================================
secrets:
  database_password:
    file: ./secrets/database_password.txt
  redis_password:
    file: ./secrets/redis_password.txt
  jwt_secret:
    file: ./secrets/jwt_secret.txt

# ===================================
# Networks
# ===================================
networks:
  frontend:
    driver: bridge
  backend:
    driver: bridge
    internal: true

# ===================================
# Volumes
# ===================================
volumes:
  postgres_data:
    driver: local
  redis_data:
    driver: local
  prometheus_data:
    driver: local
  grafana_data:
    driver: local

# ===================================
# Services
# ===================================
services:
  # ===================================
  # PostgreSQL Database
  # ===================================
  postgres:
    image: postgres:16-alpine
    container_name: obsidian-postgres
    restart: unless-stopped
    networks:
      - backend
    ports:
      - "${DATABASE_PORT:-5432}:5432"
    environment:
      POSTGRES_DB: ${DATABASE_NAME:-obsidian_enterprise}
      POSTGRES_USER: ${DATABASE_USER:-obsidian_ent}
      POSTGRES_PASSWORD_FILE: /run/secrets/database_password
      POSTGRES_INITDB_ARGS: "--data-checksums --encoding=UTF8"
      PGDATA: /var/lib/postgresql/data/pgdata
    secrets:
      - database_password
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./scripts/init-db.sql:/docker-entrypoint-initdb.d/init.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DATABASE_USER:-obsidian_ent} -d ${DATABASE_NAME:-obsidian_enterprise}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    deploy:
      resources:
        limits:
          cpus: '2.0'
          memory: 2G
        reservations:
          cpus: '1.0'
          memory: 1G
    profiles:
      - dev
      - staging
      - production

  # ===================================
  # Redis Cache
  # ===================================
  redis:
    image: redis:7-alpine
    container_name: obsidian-redis
    restart: unless-stopped
    networks:
      - backend
    ports:
      - "${REDIS_PORT:-6379}:6379"
    command: >
      redis-server
      --requirepass $(cat /run/secrets/redis_password)
      --maxmemory 512mb
      --maxmemory-policy allkeys-lru
      --save 60 1000
      --appendonly yes
      --appendfsync everysec
    secrets:
      - redis_password
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "--raw", "incr", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5
      start_period: 10s
    deploy:
      resources:
        limits:
          cpus: '1.0'
          memory: 768M
        reservations:
          cpus: '0.5'
          memory: 512M
    profiles:
      - dev
      - staging
      - production

  # ===================================
  # Spring Boot Backend
  # ===================================
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
      args:
        GRADLE_OPTS: "-Dorg.gradle.daemon=false"
    image: obsidian-enterprise-backend:latest
    container_name: obsidian-backend
    restart: unless-stopped
    networks:
      - frontend
      - backend
    ports:
      - "${SERVER_PORT:-8080}:8080"
    environment:
      # Environment
      ENVIRONMENT: ${ENVIRONMENT:-production}
      
      # Server
      SERVER_PORT: 8080
      
      # Database
      DATABASE_HOST: postgres
      DATABASE_PORT: 5432
      DATABASE_NAME: ${DATABASE_NAME:-obsidian_enterprise}
      DATABASE_USER: ${DATABASE_USER:-obsidian_ent}
      
      # Redis
      REDIS_HOST: redis
      REDIS_PORT: 6379
      
      # JWT
      JWT_ISSUER: ${JWT_ISSUER:-ObsidianEnterprise}
      JWT_AUDIENCE: ${JWT_AUDIENCE:-ObsidianBackupApp}
      
      # SAML SSO
      SAML_ENABLED: ${SAML_ENABLED:-false}
      SAML_ENTITY_ID: ${SAML_ENTITY_ID:-}
      SAML_IDP_METADATA_URL: ${SAML_IDP_METADATA_URL:-}
      
      # FCM
      FCM_ENABLED: ${FCM_ENABLED:-false}
      FCM_PROJECT_ID: ${FCM_PROJECT_ID:-}
      
      # Monitoring
      PROMETHEUS_ENABLED: true
      ZIPKIN_ENABLED: ${ZIPKIN_ENABLED:-false}
      
      # Logging
      LOG_LEVEL_ROOT: ${LOG_LEVEL_ROOT:-INFO}
      LOG_LEVEL_APP: ${LOG_LEVEL_APP:-DEBUG}
    secrets:
      - database_password
      - redis_password
      - jwt_secret
    env_file:
      - .env
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:8080/actuator/health/liveness"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 60s
    deploy:
      resources:
        limits:
          cpus: '2.0'
          memory: 4G
        reservations:
          cpus: '1.0'
          memory: 2G
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
    profiles:
      - dev
      - staging
      - production

  # ===================================
  # Admin Console (React)
  # ===================================
  admin-console:
    build:
      context: ./admin-console
      dockerfile: Dockerfile
    image: obsidian-admin-console:latest
    container_name: obsidian-admin
    restart: unless-stopped
    networks:
      - frontend
    ports:
      - "${ADMIN_PORT:-3000}:80"
    environment:
      VITE_API_URL: ${VITE_API_URL:-http://localhost:8080}
    depends_on:
      - backend
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost/"]
      interval: 30s
      timeout: 3s
      retries: 3
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 512M
        reservations:
          cpus: '0.25'
          memory: 256M
    profiles:
      - dev
      - staging
      - production

  # ===================================
  # Prometheus (Metrics Collection)
  # ===================================
  prometheus:
    image: prom/prometheus:latest
    container_name: obsidian-prometheus
    restart: unless-stopped
    networks:
      - frontend
      - backend
    ports:
      - "9090:9090"
    volumes:
      - ./config/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus_data:/prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
      - '--storage.tsdb.retention.time=30d'
      - '--web.console.libraries=/etc/prometheus/console_libraries'
      - '--web.console.templates=/etc/prometheus/consoles'
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:9090/-/healthy"]
      interval: 30s
      timeout: 5s
      retries: 3
    deploy:
      resources:
        limits:
          cpus: '1.0'
          memory: 1G
    profiles:
      - staging
      - production

  # ===================================
  # Grafana (Metrics Visualization)
  # ===================================
  grafana:
    image: grafana/grafana:latest
    container_name: obsidian-grafana
    restart: unless-stopped
    networks:
      - frontend
    ports:
      - "3001:3000"
    environment:
      GF_SECURITY_ADMIN_USER: ${GRAFANA_ADMIN_USER:-admin}
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_ADMIN_PASSWORD:-admin}
      GF_INSTALL_PLUGINS: grafana-piechart-panel
    volumes:
      - grafana_data:/var/lib/grafana
      - ./config/grafana/dashboards:/etc/grafana/provisioning/dashboards:ro
      - ./config/grafana/datasources:/etc/grafana/provisioning/datasources:ro
    depends_on:
      - prometheus
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:3000/api/health"]
      interval: 30s
      timeout: 5s
      retries: 3
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 512M
    profiles:
      - staging
      - production

  # ===================================
  # Nginx Reverse Proxy (Production)
  # ===================================
  nginx:
    image: nginx:alpine
    container_name: obsidian-nginx
    restart: unless-stopped
    networks:
      - frontend
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./config/nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./config/nginx/ssl:/etc/nginx/ssl:ro
      - /etc/letsencrypt:/etc/letsencrypt:ro
    depends_on:
      - backend
      - admin-console
    healthcheck:
      test: ["CMD", "nginx", "-t"]
      interval: 30s
      timeout: 5s
      retries: 3
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 256M
    profiles:
      - production
